interface:
  display_name: "Kelpi Setup"
  short_description: "Connect Kelpi MCP and verify access."
  default_prompt: "Use $kelpi-mcp-setup to connect the Kelpi MCP endpoint and verify the workspace is ready."
dependencies:
  tools:
    - type: "mcp"
      value: "kelpi"
      description: "Kelpi hosted MCP server"
      transport: "streamable_http"
      url: "https://app.kelpi.ai/api/mcp"
policy:
  allow_implicit_invocation: true
